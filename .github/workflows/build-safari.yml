name: Build Safari extension

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Download SponsorBlock Safari release
        run: |
          curl -L \
            -o "$RUNNER_TEMP/SafariExtension.zip" \
            https://github.com/ajayyy/SponsorBlock/releases/download/6.1.6/SafariExtension.zip

      - name: Unzip release
        run: |
          mkdir -p "$RUNNER_TEMP/SafariExtension"
          unzip -q "$RUNNER_TEMP/SafariExtension.zip" -d "$RUNNER_TEMP/SafariExtension"

      - name: Package Safari extension
        run: |
          mkdir -p "$RUNNER_TEMP/packaged"
          cd "$RUNNER_TEMP/packaged"
          xcrun safari-web-extension-packager "$RUNNER_TEMP/SafariExtension"

      - name: Build macOS app
        run: |
          PROJECT_PATH="$RUNNER_TEMP/packaged/SponsorBlock for YouTube/SponsorBlock for YouTube.xcodeproj"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -target "SponsorBlock for YouTube (macOS)" \
            -configuration Release \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build-macos" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip macOS app
        run: |
          APP_PATH="$RUNNER_TEMP/build-macos/SponsorBlock for YouTube.app"
          ditto -c -k --keepParent \
            "$APP_PATH" \
            "$RUNNER_TEMP/sponsorblock-safari-macos-app.zip"

      - name: Build iOS device app
        run: |
          PROJECT_PATH="$RUNNER_TEMP/packaged/SponsorBlock for YouTube/SponsorBlock for YouTube.xcodeproj"

          xcodebuild \
            -project "$PROJECT_PATH" \
            -target "SponsorBlock for YouTube (iOS)" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CONFIGURATION_BUILD_DIR="$RUNNER_TEMP/build-ios-device" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Zip iOS device app
        run: |
          APP_PATH="$RUNNER_TEMP/build-ios-device/SponsorBlock for YouTube.app"
          ditto -c -k --keepParent \
            "$APP_PATH" \
            "$RUNNER_TEMP/sponsorblock-safari-ios-device-app.zip"

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponsorblock-safari-builds
          path: |
            ${{ runner.temp }}/sponsorblock-safari-macos-app.zip
            ${{ runner.temp }}/sponsorblock-safari-ios-device-app.zip

      - name: Upload apps to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload \
            "${{ github.event.release.tag_name }}" \
            "$RUNNER_TEMP/sponsorblock-safari-macos-app.zip" \
            "$RUNNER_TEMP/sponsorblock-safari-ios-device-app.zip" \
            --clobber
