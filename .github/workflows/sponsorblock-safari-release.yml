name: Package SponsorBlock Safari Release

on:
  workflow_dispatch:
    inputs:
      safari_release_zip_url:
        description: "SponsorBlock SafariExtension.zip release URL"
        required: true
        default: "https://github.com/ajayyy/SponsorBlock/releases/latest/download/SafariExtension.zip"
      build_xcode_project:
        description: "Build generated macOS and iOS Xcode targets without code signing; leave enabled to publish build products"
        required: true
        type: boolean
        default: true
      upload_to_release:
        description: "Attach the packaged outputs to a GitHub Release as well as Actions artifacts"
        required: true
        type: boolean
        default: true
      release_tag:
        description: "Release tag to create/update for manual runs. Leave blank to use safari-release-<run number>. Tag pushes use the pushed tag."
        required: false
        default: ""
  push:
    tags:
      - "safari-v*"

permissions:
  contents: write

jobs:
  package-sponsorblock-safari-release:
    name: Package SponsorBlock Safari release with xcrun
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          xcrun --find safari-web-extension-packager

      - name: Download SponsorBlock Safari release zip
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/sponsorblock-safari-release"
          SAFARI_RELEASE_ZIP_URL="${{ inputs.safari_release_zip_url || 'https://github.com/ajayyy/SponsorBlock/releases/latest/download/SafariExtension.zip' }}"
          echo "Downloading: $SAFARI_RELEASE_ZIP_URL"
          curl --fail --location --retry 5 --retry-delay 5 \
            --output "$RUNNER_TEMP/sponsorblock-safari-release/SafariExtension.zip" \
            "$SAFARI_RELEASE_ZIP_URL"
          ls -lh "$RUNNER_TEMP/sponsorblock-safari-release/SafariExtension.zip"

      - name: Unzip Safari release
        id: unzip
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="$RUNNER_TEMP/sponsorblock-safari-release/unpacked"
          mkdir -p "$RELEASE_DIR"
          unzip -q "$RUNNER_TEMP/sponsorblock-safari-release/SafariExtension.zip" -d "$RELEASE_DIR"

          echo "Unpacked files:"
          find "$RELEASE_DIR" -maxdepth 3 -print | sort

          MANIFEST_PATH=$(find "$RELEASE_DIR" -name manifest.json -type f | head -n 1 || true)
          if [[ -z "$MANIFEST_PATH" ]]; then
            echo "::error::SafariExtension.zip did not contain manifest.json."
            exit 1
          fi

          EXTENSION_DIR=$(dirname "$MANIFEST_PATH")
          echo "extension_dir=$EXTENSION_DIR" >> "$GITHUB_OUTPUT"
          echo "Found WebExtension manifest at: $MANIFEST_PATH"
          cat "$MANIFEST_PATH"

      - name: Package with safari-web-extension-packager
        id: package
        shell: bash
        run: |
          set -euo pipefail
          EXTENSION_DIR="${{ steps.unzip.outputs.extension_dir }}"
          PROJECT_LOCATION="$RUNNER_TEMP/sponsorblock-safari-release/generated-xcode"
          mkdir -p "$PROJECT_LOCATION"

          PACKAGER_OK=true
          (
            cd "$PROJECT_LOCATION"
            xcrun safari-web-extension-packager --copy-resources "$EXTENSION_DIR"
          ) || PACKAGER_OK=false

          PROJECT=$(find "$PROJECT_LOCATION" -name '*.xcodeproj' -type d | head -n 1 || true)
          if [[ "$PACKAGER_OK" != "true" || -z "$PROJECT" ]]; then
            echo "::warning::safari-web-extension-packager --copy-resources failed or did not create a .xcodeproj; retrying documented path-only form."
            find "$PROJECT_LOCATION" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            (
              cd "$PROJECT_LOCATION"
              xcrun safari-web-extension-packager "$EXTENSION_DIR"
            )
            PROJECT=$(find "$PROJECT_LOCATION" -name '*.xcodeproj' -type d | head -n 1 || true)
          fi

          if [[ -z "$PROJECT" ]]; then
            echo "::error::No .xcodeproj was generated by safari-web-extension-packager."
            find "$PROJECT_LOCATION" -maxdepth 4 -print | sort
            exit 1
          fi

          echo "project_location=$PROJECT_LOCATION" >> "$GITHUB_OUTPUT"
          echo "xcode_project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "Generated Xcode project contents:"
          find "$PROJECT_LOCATION" -maxdepth 4 -print | sort

      - name: Build unsigned Safari extension apps for macOS and iOS
        if: ${{ github.event_name == 'push' || inputs.build_xcode_project }}
        shell: bash
        run: |
          set -euo pipefail
          PROJECT="${{ steps.package.outputs.xcode_project }}"
          if [[ -z "$PROJECT" || ! -d "$PROJECT" ]]; then
            echo "::error::No .xcodeproj was generated."
            exit 1
          fi

          xcodebuild -list -json -project "$PROJECT" > "$RUNNER_TEMP/xcodebuild-list.json"
          mapfile -t SCHEMES < <(python3 - <<'PYSCHEMES'
          import json, os
          with open(os.environ["RUNNER_TEMP"] + "/xcodebuild-list.json") as f:
              data = json.load(f)
          for scheme in data.get("project", {}).get("schemes", []):
              print(scheme)
          PYSCHEMES
          )

          if [[ "${#SCHEMES[@]}" -eq 0 ]]; then
            echo "::error::Could not detect any Xcode schemes."
            cat "$RUNNER_TEMP/xcodebuild-list.json"
            exit 1
          fi

          build_for_platform() {
            local platform="$1"
            local derived_data="$RUNNER_TEMP/sponsorblock-safari-release/DerivedData-$platform"
            local log_dir="$RUNNER_TEMP/sponsorblock-safari-release/build-logs"
            mkdir -p "$log_dir"

            for scheme in "${SCHEMES[@]}"; do
              echo "Trying $platform Release build with scheme: $scheme"
              if xcodebuild \
                -project "$PROJECT" \
                -scheme "$scheme" \
                -configuration Release \
                -destination "generic/platform=$platform" \
                -derivedDataPath "$derived_data" \
                CODE_SIGNING_ALLOWED=NO \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGN_IDENTITY="" \
                build > "$log_dir/$platform-$scheme.log" 2>&1; then
                echo "$scheme" > "$RUNNER_TEMP/sponsorblock-safari-release/$platform-scheme.txt"
                echo "$derived_data" > "$RUNNER_TEMP/sponsorblock-safari-release/$platform-derived-data.txt"
                cat "$log_dir/$platform-$scheme.log"
                return 0
              fi
              echo "Scheme $scheme did not build for $platform. Last log lines:"
              tail -n 80 "$log_dir/$platform-$scheme.log" || true
            done

            echo "::error::None of the generated Xcode schemes built for $platform. The Safari extension must support $platform."
            return 1
          }

          build_for_platform macOS
          build_for_platform iOS

      - name: Upload generated Safari Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: sponsorblock-safari-xcode-project
          path: ${{ steps.package.outputs.project_location }}
          if-no-files-found: error

      - name: Upload unsigned macOS Safari build products
        if: ${{ github.event_name == 'push' || inputs.build_xcode_project }}
        uses: actions/upload-artifact@v4
        with:
          name: sponsorblock-safari-macos-unsigned-build-products
          path: ${{ runner.temp }}/sponsorblock-safari-release/DerivedData-macOS/Build/Products/Release
          if-no-files-found: error

      - name: Upload unsigned iOS Safari build products
        if: ${{ github.event_name == 'push' || inputs.build_xcode_project }}
        uses: actions/upload-artifact@v4
        with:
          name: sponsorblock-safari-ios-unsigned-build-products
          path: ${{ runner.temp }}/sponsorblock-safari-release/DerivedData-iOS/Build/Products/Release-iphoneos
          if-no-files-found: error

      - name: Prepare release assets
        id: release_assets
        shell: bash
        run: |
          set -euo pipefail
          ASSET_DIR="$RUNNER_TEMP/sponsorblock-safari-release/release-assets"
          mkdir -p "$ASSET_DIR"

          PROJECT_ZIP="$ASSET_DIR/sponsorblock-safari-xcode-project.zip"
          ditto -c -k --keepParent "${{ steps.package.outputs.project_location }}" "$PROJECT_ZIP"
          echo "project_zip=$PROJECT_ZIP" >> "$GITHUB_OUTPUT"

          BUILD_REQUIRED="${{ github.event_name == 'push' || inputs.build_xcode_project }}"
          MACOS_BUILD_PRODUCTS="${{ runner.temp }}/sponsorblock-safari-release/DerivedData-macOS/Build/Products/Release"
          IOS_BUILD_PRODUCTS="${{ runner.temp }}/sponsorblock-safari-release/DerivedData-iOS/Build/Products/Release-iphoneos"
          MACOS_BUILD_ZIP=""
          IOS_BUILD_ZIP=""

          if [[ -d "$MACOS_BUILD_PRODUCTS" ]]; then
            MACOS_BUILD_ZIP="$ASSET_DIR/sponsorblock-safari-macos-unsigned-build-products.zip"
            ditto -c -k --keepParent "$MACOS_BUILD_PRODUCTS" "$MACOS_BUILD_ZIP"
            echo "macos_build_zip=$MACOS_BUILD_ZIP" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_REQUIRED" == "true" ]]; then
            echo "::error::macOS build products are required but were not found at $MACOS_BUILD_PRODUCTS."
            exit 1
          fi

          if [[ -d "$IOS_BUILD_PRODUCTS" ]]; then
            IOS_BUILD_ZIP="$ASSET_DIR/sponsorblock-safari-ios-unsigned-build-products.zip"
            ditto -c -k --keepParent "$IOS_BUILD_PRODUCTS" "$IOS_BUILD_ZIP"
            echo "ios_build_zip=$IOS_BUILD_ZIP" >> "$GITHUB_OUTPUT"
          elif [[ "$BUILD_REQUIRED" == "true" ]]; then
            echo "::error::iOS build products are required but were not found at $IOS_BUILD_PRODUCTS."
            exit 1
          fi

          {
            echo "files<<EOF"
            echo "$PROJECT_ZIP"
            if [[ -n "$MACOS_BUILD_ZIP" ]]; then
              echo "$MACOS_BUILD_ZIP"
            fi
            if [[ -n "$IOS_BUILD_ZIP" ]]; then
              echo "$IOS_BUILD_ZIP"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Release assets:"
          ls -lh "$ASSET_DIR"

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          elif [[ -n "${{ inputs.release_tag }}" ]]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="safari-release-${{ github.run_number }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Create or update GitHub Release
        if: ${{ github.event_name == 'push' || inputs.upload_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: SponsorBlock Safari package ${{ steps.release_tag.outputs.tag }}
          body: |
            Generated from SponsorBlock Safari release zip:
            `${{ inputs.safari_release_zip_url || 'https://github.com/ajayyy/SponsorBlock/releases/latest/download/SafariExtension.zip' }}`

            This release contains:
            - the generated Safari Xcode project produced by `xcrun safari-web-extension-packager`
            - the unsigned macOS Release build products when the build is enabled, including tag-triggered releases
            - the unsigned iOS Release build products when the build is enabled, including tag-triggered releases
          files: ${{ steps.release_assets.outputs.files }}
          fail_on_unmatched_files: true
